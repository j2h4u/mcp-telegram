[project]
name = "mcp-telegram"
version = "0.1.2"
description = "MCP server to work with Telegram through MTProto"
license = "MIT"
license-files = ["LICENSE"]
requires-python = ">=3.14"
dependencies = [
  "mcp>=1.26.0",
  "telethon>=1.42.0",
  "pydantic>=2.12.5",
  "pydantic-settings>=2.13.1",
  "typer>=0.26.7",
  "xdg-base-dirs>=6.0.0",
  "rapidfuzz>=3.14.3",
  "anyascii>=0.3.3",
  "snowballstemmer>=3.1.1",
  "phonenumbers>=9.0.32",
  "starlette>=1.3.1",
  "uvicorn>=0.49.0",
]

[build-system]
requires = ["setuptools>=77"]
build-backend = "setuptools.build_meta"

[dependency-groups]
dev = [
    "mypy>=1.19.1",
    "pytest>=9.1.0",
    "pytest-asyncio>=1.3.0",
    "hypothesis>=6.155.2",
    "ruff>=0.15.17",
    "vulture>=2",
    "pytest-cov>=7",
]

[project.scripts]
mcp-telegram = "mcp_telegram:app"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["tests"]
asyncio_mode = "auto"

[tool.mypy]
plugins = ["pydantic.mypy"]
check_untyped_defs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true

[[tool.mypy.overrides]]
module = "telethon.*"
ignore_missing_imports = true
follow_imports = "skip"

[[tool.mypy.overrides]]
module = ["qrcode", "qrcode.*"]
ignore_missing_imports = true

[tool.setuptools.package-data]
"*" = ["py.typed"]

[tool.vulture]
# models.py is excluded: it is a declarations-only schema module (TypedDict /
# dataclass / StrEnum), where vulture only emits false "unused variable" findings
# for schema fields and cannot see annotation-only type usage.
# vulture_whitelist.py lists intentionally-retained symbols (text-rendering layer,
# framework/dotMD false positives) so the advisory scan flags only NEW dead code.
paths = ["src/mcp_telegram", "vulture_whitelist.py"]
exclude = ["src/mcp_telegram/models.py"]
min_confidence = 60
# Entrypoints/callbacks registered via decorators look "unused" to vulture's static
# scan; Pydantic validators are invoked by Pydantic, not called directly.
ignore_decorators = [
    "@app.command", "@app.callback", "@feedback_app.command", "@mcp_tool",
    "@field_validator", "@model_validator",
]

[tool.coverage.run]
source = ["src/mcp_telegram"]
branch = true

[tool.coverage.report]
show_missing = true
