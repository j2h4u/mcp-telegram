name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - ".planning/**"
      - "**/*.md"
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 21 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  UV_LINK_MODE: hardlink

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true

      - uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2
        with:
          tool: just

      - name: Install dependencies
        run: uv sync --locked

      - name: Static quality gate
        run: just check

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true

      - uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2
        with:
          tool: just

      - name: Install dependencies
        run: uv sync --locked

      - name: Unit tests
        run: just unit

  crap:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true

      - uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2
        with:
          tool: just

      - name: Install dependencies
        run: uv sync --locked

      - name: CRAP ratchet
        run: just crap-check

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true

      - uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2
        with:
          tool: just

      - name: Install dependencies
        run: uv sync --locked

      - name: Coverage floor
        run: just coverage-check

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2
        with:
          tool: just

      - name: Production Docker image build
        run: just docker-build-check

  ci:
    if: always()
    runs-on: ubuntu-latest
    needs: [quality, unit, crap, coverage, docker-build]
    steps:
      - name: Check required jobs
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || \
             [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            exit 1
          fi
