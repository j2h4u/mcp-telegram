name: CI

# Mirrors `just check` (ruff + mypy + pytest) and adds an advisory dead-code scan.
# Type checking stays on mypy (the pydantic.mypy plugin gives pydantic-aware checks
# that pyright can't). No ruff-format step — this repo doesn't use ruff format.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --group dev
      - name: Lint
        run: uv run ruff check src tests deploy
      - name: Type check
        run: uv run mypy src/mcp_telegram deploy
      - name: Dead-code (vulture, advisory)
        run: uv run vulture
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --group dev
      - name: Tests
        run: uv run pytest
