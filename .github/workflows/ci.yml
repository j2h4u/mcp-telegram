name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - ".planning/**"
      - "**/*.md"
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 21 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  UV_LINK_MODE: hardlink

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install dependencies
        run: uv sync --locked

      - name: Static quality gate
        run: just check

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install dependencies
        run: uv sync --locked

      - name: Unit tests
        run: just unit

  crap:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install dependencies
        run: uv sync --locked

      - name: CRAP ratchet
        run: just crap-check

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install dependencies
        run: uv sync --locked

      - name: Coverage floor
        run: just coverage-check

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: docker/setup-buildx-action@v4.2.0

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Production Docker image build
        run: just docker-build-check

  ci:
    if: always()
    runs-on: ubuntu-latest
    needs: [quality, unit, crap, coverage, docker-build]
    steps:
      - name: Check required jobs
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || \
             [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            exit 1
          fi
