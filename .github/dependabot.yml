# Dependabot configuration — version updates.
# Security updates and vulnerability alerts are enabled at the repo level
# (Settings → Code security).
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Asia/Almaty"
    # Cooldown applies to version updates only; security updates remain immediate.
    cooldown:
      default-days: 14
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      python-minor-patch:
        applies-to: "version-updates"
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      python-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Asia/Almaty"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      github-actions:
        applies-to: "version-updates"
        patterns:
          - "*"
      github-actions-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  # Base image + uv build stage pinned in deploy/Dockerfile
  - package-ecosystem: "docker"
    directory: "/deploy"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Asia/Almaty"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      docker-images:
        applies-to: "version-updates"
        patterns:
          - "*"
