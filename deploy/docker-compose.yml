services:
  mcp-telegram:
    build:
      context: /path/to/repo          # path to cloned mcp-telegram repo
      dockerfile: deploy/Dockerfile
    container_name: mcp-telegram
    restart: unless-stopped
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - MCP_TELEGRAM_HTTP_HOST=0.0.0.0
      - MCP_TELEGRAM_HTTP_PORT=3100
      # The container binds all interfaces internally, while Docker publishes
      # the port only on host loopback below.
      - MCP_TELEGRAM_HTTP_ALLOW_UNSAFE=1
      - MCP_TELEGRAM_HTTP_ALLOWED_HOSTS=127.0.0.1:*,localhost:*,mcp-telegram:3100,mcp-telegram:*
      - MCP_TELEGRAM_HTTP_ALLOWED_ORIGINS=http://127.0.0.1:*,http://localhost:*
      - PYTHONUNBUFFERED=1
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - /srv/mcp-telegram/database:/srv/mcp-telegram/database
      - /opt/docker/mcp-telegram/config.toml:/root/.config/mcp-telegram/config.toml:ro
