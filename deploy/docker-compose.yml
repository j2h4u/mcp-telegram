services:
  mcp-telegram:
    build:
      context: /path/to/repo          # path to cloned mcp-telegram repo
      dockerfile: deploy/Dockerfile
    container_name: mcp-telegram
    restart: unless-stopped
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - MCP_TELEGRAM_HTTP_HOST=0.0.0.0
      - MCP_TELEGRAM_HTTP_PORT=3100
      - PYTHONUNBUFFERED=1
    ports:
      - "3100:3100"
    volumes:
      - state:/root/.local/state/mcp-telegram
      - ./telegram_session.session:/root/.local/state/mcp-telegram/mcp_telegram_session.session

volumes:
  state:
